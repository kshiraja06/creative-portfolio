<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshiraja | Graphic Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/HelloImperfectRegular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="graphic-design-page">
    <div class="page-wipe" id="page-wipe" aria-hidden="true"></div>

    <main class="graphic-design-page-main">
        <header class="landing-top">
            <p>creative portfolio</p>
            <p><img src="./assets/ui/location.png" alt="" aria-hidden="true">bangalore, india</p>
        </header>
        <div class="side-scroller-wrap" aria-hidden="true">
            <img src="./assets/ui/side scroller.png" alt="" class="side-scroller">
        </div>
        <div class="side-menu-overlay" aria-hidden="true">
            <a href="./index.html#landing" class="slot-label slot-link" data-nav="home">Home</a>
            <a href="./index.html#about" class="slot-label slot-link" data-nav="about">About</a>
            <a href="./works.html" class="slot-label slot-link" data-nav="works">Work</a>
            <a href="./mailto:hello@kshiraja.com" class="slot-label slot-link">Contact</a>
        </div>

        <section class="graphic-design-section" id="graphic-design">
            <div class="graphic-design-wipe" aria-hidden="true"></div>
            
            <header class="graphic-design-header reveal-graphic-design" style="opacity: 1; transform: translateY(0);">
                <h1 class="graphic-design-title">make it up!</h1>
            </header>

            <div class="graphic-design-content">
                <div class="project-summary reveal-graphic-design" style="opacity: 1; transform: translateY(0);">
                    <p>packaging and card design for tabletop game, make it up!</p>
                </div>

                <!-- Cards Section -->
                <div class="cards-section reveal-graphic-design">
                    <div class="cards-spread" id="cards-spread">
                        <img src="./assets/works/graphic design/back 1.png" alt="Card back 1" class="card-back" data-index="0">
                        <img src="./assets/works/graphic design/back 2.png" alt="Card back 2" class="card-back" data-index="1">
                        <img src="./assets/works/graphic design/back 3.png" alt="Card back 3" class="card-back" data-index="2">
                        <img src="./assets/works/graphic design/back 4.png" alt="Card back 4" class="card-back" data-index="3">
                    </div>
                </div>

                <!-- Packaging Design Section -->
                <div class="packaging-section reveal-graphic-design">
                    <img src="./assets/works/graphic design/packaging.png" alt="Packaging Design" class="packaging-image" id="packaging-img">
                </div>
            </div>
        </section>

        <section class="contact-section" id="contact">
            <div class="contact-content">
                <div class="contact-header">
                    <h2 class="contact-title">lets collaborate on something fun, meaningful and creative :)</h2>
                </div>
                <div class="contact-links">
                    <a href="https://instagram.com/kiasartchive" target="_blank" class="contact-link" title="Instagram">
                        <span>Instagram @kiasartchive</span>
                    </a>
                    <a href="https://www.linkedin.com/in/kshiraja-ragothaman-50905a3a9/" target="_blank" class="contact-link" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:kshiraja.ragoth@gmail.com" class="contact-link" title="Email">
                        <span>kshiraja.ragoth@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setupPageEntryTransition();
            setupGraphicDesignIntro();
            setupWipeNavigation();
            initializeCardsAnimation();
            setupPackagingLightbox();
        });

        function setupPageEntryTransition() {
            const wipe = document.getElementById("page-wipe");
            if (!wipe || typeof gsap === "undefined") {
                return;
            }
            gsap.set(wipe, { opacity: 0 });
            
            // Hide the graphic design wipe element
            const graphicDesignWipe = document.querySelector(".graphic-design-wipe");
            if (graphicDesignWipe) {
                graphicDesignWipe.style.display = "none";
            }
        }

        function setupGraphicDesignIntro() {
            if (typeof gsap === "undefined") {
                return;
            }
            gsap.set(".side-scroller-wrap, .slot-label, .graphic-design-title, .project-summary, .cards-section, .packaging-section", {
                opacity: 1
            });
        }

        function setupWipeNavigation() {
            const links = document.querySelectorAll(".slot-link");
            const wipe = document.getElementById("page-wipe");
            if (!links.length || !wipe || typeof gsap === "undefined") return;

            links.forEach((link) => {
                link.addEventListener("click", (event) => {
                    const href = link.getAttribute("href");
                    if (!href || href.startsWith("#")) return;

                    event.preventDefault();
                    gsap.to(wipe, {
                        opacity: 1,
                        duration: 0.3,
                        ease: "power2.in",
                        onComplete: () => {
                            window.location.href = href;
                        }
                    });
                });
            });
        }

        let cardsExpanded = false;

        function initializeCardsAnimation() {
            const cardsSpread = document.getElementById("cards-spread");
            if (!cardsSpread) return;

            // Set initial positions for cards spread (like holding in hand)
            const cards = cardsSpread.querySelectorAll('.card-back');
            
            // Position cards in a spread pattern
            cards.forEach((card, index) => {
                const angle = (index - 1.5) * 15; // Spread angle
                const x = (index - 1.5) * 40; // Horizontal spread
                const y = Math.abs(index - 1.5) * 20; // Vertical curve
                
                gsap.set(card, {
                    rotation: angle,
                    x: x,
                    y: y,
                    scale: 0.9,
                    transformOrigin: "center center",
                    cursor: "pointer"
                });
            });

            // Add hover handlers for card expansion
            cardsSpread.addEventListener('mouseenter', expandCards);
            cardsSpread.addEventListener('mouseleave', collapseCards);
        }

        function expandCards() {
            cardsExpanded = true;
            const cards = document.querySelectorAll('.card-back');
            
            cards.forEach((card, index) => {
                // Animate to horizontal layout showing front
                gsap.to(card, {
                    rotation: 0,
                    x: index * 350 - 525, // Wider horizontal layout for even bigger cards
                    y: 0,
                    scale: 1,
                    duration: 1.0,
                    ease: "none", // Linear timing for smooth animation
                    onUpdate: function() {
                        // Swap to front image smoothly during animation
                        if (this.progress() > 0.3 && !card.dataset.flipped) {
                            card.dataset.flipped = 'true';
                            card.src = `./assets/works/graphic design/front ${index + 1}.png`;
                        }
                    }
                });
            });
        }

        function collapseCards() {
            cardsExpanded = false;
            const cards = document.querySelectorAll('.card-back');
            
            cards.forEach((card, index) => {
                // Reset to back image
                card.src = `./assets/works/graphic design/back ${index + 1}.png`;
                delete card.dataset.flipped;
                
                // Animate back to spread position
                const angle = (index - 1.5) * 15;
                const x = (index - 1.5) * 40;
                const y = Math.abs(index - 1.5) * 20;
                
                gsap.to(card, {
                    rotation: angle,
                    x: x,
                    y: y,
                    scale: 0.9,
                    duration: 1.0,
                    ease: "none" // Linear timing for smooth animation
                });
            });
        }

        function setupPackagingLightbox() {
            const packagingImg = document.getElementById("packaging-img");
            if (!packagingImg) return;
            
            packagingImg.style.cursor = "pointer";
            packagingImg.addEventListener("click", () => {
                createLightbox(packagingImg.src, "Packaging Design");
            });
        }

        function createLightbox(src, alt) {
            // Create lightbox overlay
            const overlay = document.createElement("div");
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                cursor: pointer;
            `;
            
            // Create enlarged image
            const img = document.createElement("img");
            img.src = src;
            img.alt = alt;
            img.style.cssText = `
                max-width: 90%;
                max-height: 90%;
                object-fit: contain;
                border: none;
                box-shadow: none;
            `;
            
            overlay.appendChild(img);
            document.body.appendChild(overlay);
            
            // Close on click
            overlay.addEventListener("click", () => {
                document.body.removeChild(overlay);
            });
        }
    </script>
</body>
</html>
