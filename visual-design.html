<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshiraja | Visual Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="./fonts/HelloImperfectRegular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="visual-design-page">
    <div class="page-wipe" id="page-wipe" aria-hidden="true"></div>

    <main class="visual-design-page-main">
        <header class="landing-top">
            <p>creative portfolio</p>
            <p><img src="./assets/ui/location.png" alt="" aria-hidden="true">bangalore, india</p>
        </header>
        <div class="side-scroller-wrap" aria-hidden="true">
            <img src="./assets/ui/side scroller.png" alt="" class="side-scroller">
        </div>
        <div class="side-menu-overlay" aria-hidden="true">
            <a href="./index.html#landing" class="slot-label slot-link" data-nav="home">Home</a>
            <a href="./index.html#about" class="slot-label slot-link" data-nav="about">About</a>
            <a href="./works.html" class="slot-label slot-link active" data-nav="works">Work</a>
            <a href="./mailto:hello@kshiraja.com" class="slot-label slot-link">Contact</a>
        </div>

        <section class="visual-design-section" id="visual-design">
            <div class="visual-design-wipe" aria-hidden="true"></div>
            
            <header class="visual-design-header">
                <h1 class="visual-design-title">VISUAL DESIGN</h1>
            </header>

            <div class="visual-design-content">
                <div class="design-description">
                    <p>works spanning illustration, animation, and graphic design.</p>
                </div>

                <div class="design-categories">
                    <a href="./graphic-design.html" class="design-category">
                        <div class="category-patch">
                            <img src="./assets/ui/patch 1.png" alt="Graphic Design patch">
                        </div>
                        <p>graphic design</p>
                    </a>
                    <a href="./illustrations.html" class="design-category">
                        <div class="category-patch">
                            <img src="./assets/ui/patch 2.png" alt="Illustrations patch">
                        </div>
                        <p>illustrations</p>
                    </a>
                </div>
            </div>
        </section>

        <section class="contact-section" id="contact">
            <div class="contact-content">
                <div class="contact-header">
                    <h2 class="contact-title">lets collaborate on something fun, meaningful and creative :)</h2>
                </div>
                <div class="contact-links">
                    <a href="https://instagram.com/kiasartchive" target="_blank" class="contact-link" title="Instagram">
                        <span>Instagram @kiasartchive</span>
                    </a>
                    <a href="https://www.linkedin.com/in/kshiraja-ragothaman-50905a3a9/" target="_blank" class="contact-link" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:kshiraja.ragoth@gmail.com" class="contact-link" title="Email">
                        <span>kshiraja.ragoth@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setupPageEntryTransition();
            setupVisualDesignIntro();
            setupWipeNavigation();
            initializeCards();
        });

        function setupPageEntryTransition() {
            const wipe = document.getElementById("page-wipe");
            if (!wipe || typeof gsap === "undefined") {
                return;
            }
            gsap.set(wipe, { opacity: 0 });
            
            // Hide the visual design wipe element
            const visualDesignWipe = document.querySelector(".visual-design-wipe");
            if (visualDesignWipe) {
                visualDesignWipe.style.display = "none";
            }
        }

        function setupVisualDesignIntro() {
            // Elements are now visible by default
            console.log("Visual design page loaded");
        }

        function setupWipeNavigation() {
            const links = document.querySelectorAll(".slot-link");
            const wipe = document.getElementById("page-wipe");
            if (!links.length || !wipe || typeof gsap === "undefined") return;

            links.forEach((link) => {
                link.addEventListener("click", (event) => {
                    const href = link.getAttribute("href");
                    if (!href || href.startsWith("#")) return;

                    event.preventDefault();
                    gsap.to(wipe, {
                        opacity: 1,
                        duration: 0.3,
                        ease: "power2.in",
                        onComplete: () => {
                            window.location.href = href;
                        }
                    });
                });
            });
        }

        let cards = [];
        let isExpanded = false;

        function initializeCards() {
            const container = document.getElementById("card-container");
            
            // Card data based on reference image
            cards = [
                { id: 1, front: "./assets/reference/card1.png", back: "./assets/reference/card2.png", title: "Brand Identity" },
                { id: 2, front: "./assets/reference/card3.png", back: "./assets/reference/card4.png", title: "Product Design" },
                { id: 3, front: "./assets/reference/card5.png", back: "./assets/reference/card6.png", title: "Packaging Concept" }
            ];

            // Create card elements
            cards.forEach((card, index) => {
                const cardElement = createCardElement(card, index);
                container.appendChild(cardElement);
            });

            // Add click handler for expansion
            container.addEventListener('click', toggleCardExpansion);
        }

        function createCardElement(card, index) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.dataset.index = index;
            
            cardDiv.innerHTML = `
                <div class="card-face card-front">
                    <img src="${card.front}" alt="${card.title}" loading="lazy" decoding="async">
                    <h3>${card.title}</h3>
                </div>
                <div class="card-face card-back">
                    <img src="${card.back}" alt="${card.title} back" loading="lazy" decoding="async">
                </div>
            `;
            
            return cardDiv;
        }

        function toggleCardExpansion(event) {
            if (event.target.closest('.card')) {
                const clickedCard = event.target.closest('.card');
                const cardIndex = parseInt(clickedCard.dataset.index);
                
                if (isExpanded) {
                    collapseCards();
                } else {
                    expandCard(clickedCard, cardIndex);
                }
            }
        }

        function expandCard(cardElement, index) {
            isExpanded = true;
            
            // Arrange all cards horizontally
            const allCards = document.querySelectorAll('.card');
            allCards.forEach((card, i) => {
                if (i === index) {
                    // Front card
                    gsap.to(card, {
                        rotationY: 0,
                        scale: 1.1,
                        duration: 0.6,
                        ease: "power2.out"
                    });
                } else {
                    // Other cards
                    gsap.to(card, {
                        rotationY: 180,
                        scale: 0.9,
                        duration: 0.6,
                        ease: "power2.out"
                    });
                }
            });
        }

        function collapseCards() {
            isExpanded = false;
            const allCards = document.querySelectorAll('.card');
            
            allCards.forEach(card => {
                gsap.to(card, {
                    rotationY: 0,
                    scale: 1,
                    duration: 0.6,
                    ease: "power2.out"
                });
            });
        }
    </script>
</body>
</html>
