<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kshiraja | Illustrations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="../fonts/HelloImperfectRegular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="stylesheet" href="../styles.css">
    <link rel="preload" href="../assets/works/personal/blue.jpg" as="image">
    <link rel="preload" href="../assets/works/personal/zuko.jpg" as="image">
</head>
<body class="illustrations-page">
    <header class="site-header">
        <div class="site-header-inner">
            <a href="../index.html#landing" class="site-brand site-brand-link">creative portfolio</a>
            <nav class="top-nav" aria-label="Primary">
                <a href="../index.html#landing" class="nav-link" data-nav="home">home</a>
                <a href="../index.html#about" class="nav-link" data-nav="about">about</a>
                <a href="../index.html#works" class="nav-link active" data-nav="works">work</a>
                <a href="../index.html#contact" class="nav-link" data-nav="contact">contact</a>
            </nav>
            <p class="site-location"><img src="../assets/ui/location.png" alt="" aria-hidden="true">bangalore, india</p>
        </div>
    </header>

    <main class="illustrations-page-main project-page-main">

        <section class="illustrations-section" id="illustrations">
            <div class="illustrations-wipe" aria-hidden="true"></div>
            
            <header class="illustrations-header reveal-illustrations" style="opacity: 1; transform: translateY(0);">
                <h1 class="illustrations-title">ILLUSTRATIONS</h1>
            </header>

            <div class="illustrations-content">
                <!-- Eyes GIF at the top -->
                <div class="eyes-feature reveal-illustrations">
                    <video src="../assets/works/personal/eyes.mp4" alt="Eyes animation" class="eyes-gif" loop autoplay muted playsinline></video>
                </div>
                
                <div class="illustrations-grid reveal-illustrations">
                    <!-- First row: blue > zuko > earrings -->
                    <div class="illustration-item">
                        <img src="../assets/works/personal/blue.jpg" alt="Blue illustration" loading="lazy" decoding="async">
                    </div>
                    <div class="illustration-item">
                        <img src="../assets/works/personal/zuko.jpg" alt="Zuko illustration" loading="lazy" decoding="async">
                    </div>
                    <div class="illustration-item">
                        <img src="../assets/works/personal/earring.jpg" alt="Earring illustration" loading="lazy" decoding="async">
                    </div>
                    
                    <!-- Second row: horror > car > vent -->
                    <div class="illustration-item">
                        <img src="../assets/works/personal/horror poster.jpg" alt="Horror poster illustration" loading="lazy" decoding="async">
                    </div>
                    <div class="illustration-item">
                        <img src="../assets/works/personal/car poster.jpg" alt="Car poster illustration" loading="lazy" decoding="async">
                    </div>
                    <div class="illustration-item">
                        <img src="../assets/works/personal/vent.jpg" alt="Vent illustration" loading="lazy" decoding="async">
                    </div>
                    
                    <!-- Third row: gartic dosts alone -->
                    <div class="illustration-item">
                        <img src="../assets/works/personal/gartic dosts 2.png" alt="Gartic dosts illustration" loading="lazy" decoding="async">
                    </div>
                </div>
            </div>
        </section>
    <section class="contact-section" id="contact">
            <div class="contact-content">
                <div class="contact-header">
                    <h2 class="contact-title">lets collaborate on something fun, meaningful and creative :)</h2>
                </div>
                <div class="contact-links">
                    <a href="https://instagram.com/kiasartchive" target="_blank" class="contact-link" title="Instagram">
                        <span>Instagram @kiasartchive</span>
                    </a>
                    <a href="https://www.linkedin.com/in/kshiraja-ragothaman-50905a3a9/" target="_blank" class="contact-link" title="LinkedIn">
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:kshiraja.ragoth@gmail.com" class="contact-link" title="Email">
                        <span>kshiraja.ragoth@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/lightbox.js"></script>
    <script src="../js/illustrations.js"></script>
</body>
</html>
